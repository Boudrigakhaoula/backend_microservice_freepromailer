# ???????????????????????????????????????????????????????????????
# TRACKING SERVICE ? Suivi ouvertures, clics, bounces, unsubs
# Port : 8083
# ???????????????????????????????????????????????????????????????

server.port=8083

spring.application.name=tracking-service

# ??? PostgreSQL ???
spring.datasource.url=jdbc:postgresql://localhost:5432/tracking_db
spring.datasource.username=postgres
spring.datasource.password=postgres123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=10000

# ??? JPA ???
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.open-in-view=false

# ??? Tracking Config ???
tracking.base-url=http://localhost:8080
tracking.pixel.cache-control=no-store, no-cache, must-revalidate
tracking.unsubscribe.redirect-url=http://localhost:4200/unsubscribed
tracking.cleanup.enabled=true
tracking.cleanup.retention-days=365
tracking.cleanup.cron=0 0 3 * * ?

# ??? Eureka ???
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.value}

# ??? Actuator ???
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=tracking-service

# ??? Logging ???
logging.level.com.pfe.tracking=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN

# ??? Swagger / OpenAPI ???
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.info.title=Tracking Service API
springdoc.info.description=API de suivi des ouvertures, clics, bounces
springdoc.info.version=1.0.0