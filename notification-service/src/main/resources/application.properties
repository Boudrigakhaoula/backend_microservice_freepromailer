# ??? NOTIFICATION SERVICE ???
server.port=8086
spring.application.name=notification-service

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/smtp_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# WebSocket
websocket.allowed-origins=http://localhost:4200
websocket.endpoint=/ws
websocket.topic-prefix=/topic

# Webhooks
webhooks.max-retries=5
webhooks.retry-delay-seconds=60
webhooks.timeout-ms=10000

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.value}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.tags.application=notification-service

# Logging
logging.level.com.pfe.notification=DEBUG