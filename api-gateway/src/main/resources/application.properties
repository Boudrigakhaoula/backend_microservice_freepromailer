# ???????????????????????????????????????????????????????????????
# API GATEWAY ? Spring Cloud Gateway
# Point d'entrée unique : http://localhost:8080
# ???????????????????????????????????????????????????????????????

server.port=8080

spring.application.name=api-gateway

# ??? Eureka Client ???
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# ???????????????????????????????????????????????????????????????
# ROUTES ? Chaque route mappe un chemin URL vers un microservice
# lb:// = load-balanced via Eureka (le nom doit correspondre ŕ spring.application.name)
# ???????????????????????????????????????????????????????????????

# ??? 1. Campaign Service (port 8081) ???
spring.cloud.gateway.routes[0].id=campaign-service
spring.cloud.gateway.routes[0].uri=lb://campaign-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/campaigns/**
spring.cloud.gateway.routes[0].predicates[1]=Method=GET,POST,PUT,DELETE,PATCH,OPTIONS

spring.cloud.gateway.routes[1].id=contact-list-service
spring.cloud.gateway.routes[1].uri=lb://campaign-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/contact-lists/**

spring.cloud.gateway.routes[2].id=contacts-service
spring.cloud.gateway.routes[2].uri=lb://campaign-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/contacts/**

spring.cloud.gateway.routes[3].id=templates-service
spring.cloud.gateway.routes[3].uri=lb://campaign-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/templates/**

# ??? 2. SMTP Service (port 8082) ???
spring.cloud.gateway.routes[4].id=smtp-send-service
spring.cloud.gateway.routes[4].uri=lb://smtp-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/send/**

spring.cloud.gateway.routes[5].id=smtp-mailbox-service
spring.cloud.gateway.routes[5].uri=lb://smtp-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/mailbox/**

spring.cloud.gateway.routes[6].id=smtp-queue-service
spring.cloud.gateway.routes[6].uri=lb://smtp-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/queue/**

spring.cloud.gateway.routes[7].id=smtp-suppression-service
spring.cloud.gateway.routes[7].uri=lb://smtp-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/suppression/**

# ??? 3. Tracking Service (port 8083) ???
spring.cloud.gateway.routes[8].id=tracking-api-service
spring.cloud.gateway.routes[8].uri=lb://tracking-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/tracking/**

spring.cloud.gateway.routes[9].id=tracking-pixel-service
spring.cloud.gateway.routes[9].uri=lb://tracking-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/track/**

# ??? 4. AI Service (port 8084) ???
spring.cloud.gateway.routes[10].id=ai-service
spring.cloud.gateway.routes[10].uri=lb://ai-service
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/ai/**

# ??? 5. Reporting Service (port 8085) ???
spring.cloud.gateway.routes[11].id=reporting-service
spring.cloud.gateway.routes[11].uri=lb://reporting-service
spring.cloud.gateway.routes[11].predicates[0]=Path=/api/reports/**

# ??? 6. Notification Service (port 8086) ???
spring.cloud.gateway.routes[12].id=notification-service
spring.cloud.gateway.routes[12].uri=lb://notification-service
spring.cloud.gateway.routes[12].predicates[0]=Path=/api/notifications/**

spring.cloud.gateway.routes[13].id=websocket-service
spring.cloud.gateway.routes[13].uri=lb://notification-service
spring.cloud.gateway.routes[13].predicates[0]=Path=/ws/**


# 7. Auth Service (port 8087)
spring.cloud.gateway.routes[14].id=auth-service
spring.cloud.gateway.routes[14].uri=lb://auth-service
spring.cloud.gateway.routes[14].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[15].id=auth-profile-service
spring.cloud.gateway.routes[15].uri=lb://auth-service
spring.cloud.gateway.routes[15].predicates[0]=Path=/api/profile/**

spring.cloud.gateway.routes[16].id=auth-admin-service
spring.cloud.gateway.routes[16].uri=lb://auth-service
spring.cloud.gateway.routes[16].predicates[0]=Path=/api/admin/**
# ???????????????????????????????????????????????????????????????
# Filters ? Traitement global des requętes
# ???????????????????????????????????????????????????????????????
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

# ??? Actuator ???
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.enabled=true

# ??? Logging ???
logging.level.org.springframework.cloud.gateway=INFO
logging.level.reactor.netty=INFO
logging.level.org.springframework.cloud.gateway.route.RouteDefinitionRouteLocator=DEBUG

# Propagation du header Authorization vers tous les services
spring.cloud.gateway.default-filters[1]=AddRequestHeader=X-Forwarded-Authorization,${request.header.Authorization}
