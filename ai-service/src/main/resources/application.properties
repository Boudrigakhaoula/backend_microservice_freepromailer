# ??? AI SERVICE ???
server.port=8084
spring.application.name=ai-service

# Provider IA
ai.provider=${AI_PROVIDER:gemini}

# Google Gemini (GRATUIT)
ai.gemini.api-key=${GEMINI_API_KEY:}
ai.gemini.model=gemini-1.5-flash
ai.gemini.base-url=https://generativelanguage.googleapis.com/v1beta
ai.gemini.max-tokens=1024
ai.gemini.temperature=0.8

# OpenAI (payant)
ai.openai.api-key=${OPENAI_API_KEY:}
ai.openai.model=gpt-3.5-turbo
ai.openai.base-url=https://api.openai.com/v1
ai.openai.max-tokens=1024
ai.openai.temperature=0.7

# Suggestions
ai.suggestions.max-subject-variants=5
ai.suggestions.max-content-length=5000
ai.suggestions.cache-ttl-minutes=60
ai.suggestions.languages=fr,en,ar

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.value}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.tags.application=ai-service

# Logging
logging.level.com.pfe.ai=DEBUG